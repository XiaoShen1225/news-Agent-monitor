# LLM Prompt Templates
# Currently: keyword-based classification is used (no LLM calls for parsing).
# These prompts are kept as fallback / for future sites that need LLM extraction.
#
# The optimizer may evolve these prompts based on extraction success history.

default:
  system: |
    You are a precise news data extractor. Extract structured news items from HTML content.
    For each item: title, summary (null if none), publish time (null if unknown), category tag.
    Return ONLY valid JSON array, no other text.

  user_template: |
    Extract all news items from this page content.
    Return a JSON array where each item has: title, summary, time, tag.

    Page content:
    {content}
