# ============================================================
# Data Visualization Course Assignment - Configuration
# ============================================================

# LLM Configuration (Zhipu AI glm-4-flash, free tokens)
llm:
  api_key: "${ZHIPU_API_KEY}"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  model: "glm-4-flash"
  temperature: 0.1
  max_tokens: 4096
  max_retries: 3

# Target websites to monitor
# Each target maps to a built-in site profile by name.
# Add "profile" dict to override extraction strategy per site.
targets:
  - url: "https://news.baidu.com/"
    name: "baidu_news"
    interval_minutes: 60
    use_browser: true    # Playwright for JS-rendered content

  - url: "https://news.sina.com.cn/"
    name: "sina_news"
    interval_minutes: 120
    use_browser: false

  # ── Article / Paper sources (RSS feeds) ──
  - url: "https://deepmind.google/blog/rss.xml"
    name: "deepmind_blog"
    interval_minutes: 360
    use_browser: false

  - url: "https://openai.com/blog/rss.xml"
    name: "openai_blog"
    interval_minutes: 360
    use_browser: false

# Scheduler settings
scheduler:
  default_interval_minutes: 60
  max_concurrent_runs: 3

# Visualization settings
visualization:
  font_family: "SimHei"  # Chinese font, fallback to DejaVu Sans
  dpi: 150
  figure_width: 12
  figure_height: 8
  output_dir: "outputs/charts"

# Data storage
storage:
  history_dir: "data/history"
  db_path: "data/monitor.db"

# Webhook / notification settings (optional)
# Uncomment and fill in to enable.
# notifications:
#   dingtalk:
#     - webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
#       secret: "SEC..."   # HMAC signing secret (optional)
