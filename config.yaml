# ============================================================
# Data Visualization Course Assignment - Configuration
# ============================================================

# LLM Configuration — multi-provider support
# provider: "zhipu" | "openai" | "claude" | "local"
llm:
  provider: "openai"
  model: "deepseek-chat"
  temperature: 0.3
  max_tokens: 4096
  max_retries: 3
  providers:
    zhipu:
      api_key: "${ZHIPU_API_KEY}"
      base_url: "https://open.bigmodel.cn/api/paas/v4/"
      model: "glm-4-flash"
    openai:
      api_key: "${DEEPSEEK_API_KEY}"
      base_url: "https://api.deepseek.com/v1"
      model: "deepseek-chat"
    claude:
      api_key: "${ANTHROPIC_API_KEY}"
      model: "claude-sonnet-4-6"
    local:
      base_url: "http://localhost:11434/v1"
      api_key: "ollama"
      model: "qwen2.5:14b"

# Target websites to monitor
# Each target maps to a built-in site profile by name.
# Add "profile" dict to override extraction strategy per site.
targets:
  - url: "https://news.baidu.com/"
    name: "baidu_news"
    interval_minutes: 60
    use_browser: true    # Playwright for JS-rendered content

  - url: "https://news.sina.com.cn/"
    name: "sina_news"
    interval_minutes: 120
    use_browser: false

  # ── Article / Paper sources (RSS feeds) ──
  - url: "https://deepmind.google/blog/rss.xml"
    name: "deepmind_blog"
    interval_minutes: 360
    use_browser: false

  - url: "https://openai.com/blog/rss.xml"
    name: "openai_blog"
    interval_minutes: 360
    use_browser: false

# Scheduler settings
scheduler:
  default_interval_minutes: 60
  max_concurrent_runs: 3

# Visualization settings
visualization:
  font_family: "SimHei"  # Chinese font, fallback to DejaVu Sans
  dpi: 150
  figure_width: 12
  figure_height: 8
  output_dir: "outputs/charts"

# Data storage
storage:
  history_dir: "data/history"
  db_path: "data/monitor.db"
  max_snapshots_per_site: 50

# Alert settings
alerts:
  anomaly:
    enabled: true
    zscore_threshold: 2.5          # Z-score threshold for volume spike detection
    baseline_snapshots: 10          # snapshots used as baseline for anomaly calc
    cooldown_minutes: 120           # cooldown between anomaly alerts per site+type
  sentiment:
    enabled: true
    shift_threshold: 0.3            # minimum % change to trigger sentiment shift alert
  keyword:
    cooldown_hours: 24              # cooldown between keyword alert repeats

# Webhook / notification settings (optional)
# Uncomment and fill in to enable.
# notifications:
#   dingtalk:
#     - webhook_url: "https://oapi.dingtalk.com/robot/send?access_token=xxx"
#       secret: "SEC..."   # HMAC signing secret (optional)
#   wecom:
#     - webhook_url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=xxx"
#   email:
#     - smtp_host: "smtp.gmail.com"
#       smtp_port: 587
#       smtp_user: "user@gmail.com"
#       smtp_password: "${SMTP_PASSWORD}"
#       to_addrs: ["alerts@example.com"]

# Dashboard auth (optional — skip if token is empty or unset)
dashboard:
  token: "${DASHBOARD_TOKEN}"

# Chat agent settings
chat:
  max_tool_rounds: 3        # max tool-calling rounds per user message
  max_history_tokens: 12000  # token budget for conversation history (12K tokens ≈ 40-50 exchanges)
  min_exchanges: 1           # always keep at least this many exchanges
  compression_threshold: 0.6  # compress when history exceeds 60% of budget
  compression_target: 0.4     # compress the oldest ~40% of exchanges
  max_tool_results: 5         # keep N recent tool results; older ones truncated
  auto_report:
    enabled: false            # set true to enable daily push reports
    schedule_hour: 9          # push report at this hour (24h format)
    schedule_minute: 0        # push report at this minute
    include_sites: []         # empty = all sites; e.g. ["baidu_news"]

# Three-layer preference memory system — L0 episodic → L1 pattern → L2 profile
memory:
  cycle_minutes: 30            # MemoryManager analysis interval
  l1_min_events: 10            # L1 triggers when L0 events >= this
  l1_cooldown_hours: 2         # minimum hours between L1 runs
  l2_cooldown_hours: 24        # minimum hours between L2 profile updates

# Deep content analysis — cross-site event aggregation & entity recognition
deep_analysis:
  enabled: true
  auto_run: false                        # auto-run after each batch fetch; false = manual trigger only
  cluster_similarity_threshold: 0.75   # cosine similarity threshold for event clustering
  min_event_items: 2                   # minimum items per event cluster
  entity_batch_size: 50                # titles per LLM batch for entity extraction
  timeline_lookback_snapshots: 20      # snapshots to search for timeline construction

# Hybrid search — BM25 keyword + vector semantic + RRF fusion
search:
  rrf_k: 60                  # RRF fusion smoothing parameter
  bm25_k1: 1.5               # BM25 term frequency saturation
  bm25_b: 0.75               # BM25 document length normalization
  bm25_top_k: 50             # BM25 coarse retrieval count
  vector_top_k: 50           # Vector coarse retrieval count

# Story watching — track ongoing news stories and detect follow-up coverage
story_watch:
  enabled: true
  similarity_threshold: 0.7            # cosine similarity threshold for follow-up detection
  match_cooldown_hours: 12             # hours between successive match alerts per story
  dormant_after_days: 30               # mark story as dormant if no matches for N days
  remove_dormant_after_days: 90        # remove dormant story after N days of inactivity
